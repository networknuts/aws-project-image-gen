server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Local Docker Compose convenience.
    # In AWS ECS, the ALB should route /api/* to the backend service directly.
    # Using a variable here prevents Nginx from failing to start in ECS when the
    # Docker Compose hostname "backend" is not present.
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
