services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: imageapp
      POSTGRES_PASSWORD: imageapp
      POSTGRES_DB: imageapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imageapp -d imageapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://imageapp:imageapp@db:5432/imageapp
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # For local AWS profile usage. On ECS, use IAM Task Roles instead.
    volumes:
      - ~/.aws:/root/.aws:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://imageapp:imageapp@db:5432/imageapp
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ~/.aws:/root/.aws:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
